app = 'careeros-api'
primary_region = 'iad'

[build]

[env]
  PORT = "8000"
  APP_ENV = "production"
  MODEL_TIER = "VPS"
  CLOUD_FALLBACK_ENABLED = "true"
  CLOUD_PROVIDER = "groq"
  BLOCK_CLOUD_PERSONAL_DATA = "true"
  SEARCH_PROVIDER = "searxng"
  SEARXNG_URL = "http://careeros-searxng.internal:8080"
  OLLAMA_BASE_URL = "http://localhost:11434"
  WHATSAPP_SESSION_PATH = "/data/wa-session"
  TELEGRAM_BOT_USERNAME = "CareerOSBot"

# Persistent volume for WhatsApp session state
[[mounts]]
  source = 'careeros_api_data'
  destination = '/data'

[[http_service]]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
