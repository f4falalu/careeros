app = 'careeros-web-f4'
primary_region = 'iad'

[build]
  [build.args]
    NEXT_PUBLIC_API_URL = "https://careeros-api-f4.fly.dev"
    NEXT_PUBLIC_WS_URL = "wss://careeros-api-f4.fly.dev"
    # NEXT_PUBLIC_APP_SECRET is passed at deploy time via:
    # fly deploy --build-arg NEXT_PUBLIC_APP_SECRET=<your-app-secret>

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
