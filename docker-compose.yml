# CareerOS — Phase 0 stack. `docker compose up` brings up everything.
# After it's up: curl http://localhost:8000/health  → should show ollama:true once a model is pulled.
services:
  postgres:
    image: pgvector/pgvector:pg16          # postgres 16 with pgvector preinstalled
    restart: unless-stopped                 # self-heal: bring the DB back if it crashes
    environment:
      POSTGRES_USER: careeros
      POSTGRES_PASSWORD: careeros
      POSTGRES_DB: careeros
    ports: ["5432:5432"]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docs/07-SCHEMA.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro   # auto-loads on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careeros"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: ["./data/redis:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports: ["11434:11434"]
    volumes: ["./data/ollama:/root/.ollama"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    # GPU users: uncomment the deploy block below (needs nvidia-container-toolkit).
    # deploy:
    #   resources:
    #     reservations:
    #       devices: [{ driver: nvidia, count: all, capabilities: [gpu] }]

  api:
    build: ./apps/api          # Node 20 + Hono + Mastra (TypeScript)
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8000:8000"]
    volumes:
      - ./apps/api:/app
      - /app/node_modules       # don't clobber container-installed deps
    command: npm run dev
    healthcheck:                # Node 20 has global fetch; no curl/wget needed in the image
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  searxng:
    image: searxng/searxng:latest
    ports: ["8888:8080"]
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      SEARXNG_SECRET_KEY: "change-this-in-production"
    restart: unless-stopped

  web:
    build: ./apps/web
    restart: unless-stopped
    depends_on: [api]
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_APP_SECRET: ${APP_SECRET}
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
