app = 'careeros-db'
primary_region = 'iad'

[build]

[env]
  POSTGRES_USER = 'careeros'
  POSTGRES_DB = 'careeros'
  PGDATA = '/data/pgdata'

[[mounts]]
  source = 'careeros_db_data'
  destination = '/data'

# TCP service keeps the machine running and accessible internally as
# careeros-db.internal:5432 via Fly private networking.
[[services]]
  protocol = 'tcp'
  internal_port = 5432
  auto_stop_machines = false
  min_machines_running = 1

  # No [[services.ports]] — no public exposure, internal only.

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
