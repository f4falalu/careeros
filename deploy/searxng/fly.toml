app = 'careeros-searxng'
primary_region = 'iad'

[build]

[[http_service]]
  internal_port = 8080
  # Not exposed publicly — API reaches it via careeros-searxng.internal:8080
  force_https = false
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
